{% if page.js %}
  {% for js in page.js %}
	<script src="{{ js | prepend: site.baseurl | replace: '//', '/' }}" defer></script>
  {% endfor %}
{% endif %}

{% if layout.common-js %}
  {% for js in layout.common-js %}
	<script src="{{ js | prepend: site.baseurl | replace: '//', '/' }}" defer></script>
  {% endfor %}
{% endif %}
